name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' \
            custom_components/huawei_fusion_hub/manifest.json

      - name: Extract changelog section
        id: changelog
        run: |
          awk -v ver="${{ steps.version.outputs.VERSION }}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found && /^\[.*\]: http/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          echo "Extracted notes:"
          cat release_notes.md

      - name: Create release zip
        run: |
          zip -r huawei_fusion_hub.zip custom_components/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "huawei-fusion-hub ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: huawei_fusion_hub.zip
